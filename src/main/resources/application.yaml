spring:
  application:
    name: ticketer

  datasource:
    url: jdbc:postgresql://localhost:5432/trouble_ticket
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus, info
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

jwt:
  secret: mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong12345
  expiration: 86400000 # 24 hrs

app:
  tenant:
    header: X-Tenant-Id