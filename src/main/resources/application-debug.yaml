spring:
  config:
    activate:
      on-profile: debug
  datasource:
    url: jdbc:postgresql://localhost:5432/trouble_ticket
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Configure Flyway to create database automatically
  flyway:
    baseline-on-migrate: true
    locations: classpath:database/migration


# Debug-specific settings
logging:
  level:
    root: INFO
    com.example.ticketer: DEBUG
    org.springframework.web: DEBUG
    org.hibernate: DEBUG
    org.flywaydb: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Enable debug endpoints
management:
  endpoints:
    web:
      exposure:
        include: "*"

# Debug server settings
server:
  port: 8081
  servlet:
    context-path: /api/v1