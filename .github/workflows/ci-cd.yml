#czysto hipotetycznie.
name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Run Unit Tests
      run: mvn test

    - name: Run Integration Tests
      run: mvn verify -Pintegration-test

    - name: SonarQube Analysis
      uses: SonarSource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    - name: Build Docker Image
      run: docker build -t trouble-ticket-api:latest .

    - name: Log in to Docker Hub
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Push Docker Image
      if: github.ref == 'refs/heads/main'
      run: |
        docker tag trouble-ticket-api:latest ${{ secrets.DOCKER_HUB_USERNAME }}/trouble-ticket-api:latest
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/trouble-ticket-api:latest

    - name: Deploy to Production
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Deployment to production would happen here"
        # Example: kubectl apply -f kubernetes-deployment.yaml
        # Or: docker-compose -f production-compose.yml up -d