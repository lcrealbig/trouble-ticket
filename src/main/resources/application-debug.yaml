server:
  port: 8081
  servlet:
    context-path: /api/debug/v1
spring:
  config:
    activate:
      on-profile: debug

logging:
  level:
    root: INFO
    com.example.ticketer: TRACE
    org.springframework.web: DEBUG
    org.hibernate: DEBUG
    org.flywaydb: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

management:
  endpoints:
    web:
      exposure:
        include: "*"

